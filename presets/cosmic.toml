# cosmic.toml — Deep-space nebula aesthetic on a hyperboloid surface.
#
# Slow camera drift, long purple-to-cyan trails, high geodesic count.

surface         = "hyperboloid"
num_geodesics   = 50
trail_length    = 500
rotation_speed  = 0.0006
time_step       = 0.016
target_fps      = 30
background_color = "#02010F"

color_palette = [
    "#9B30FF",   # deep violet
    "#6A0DAD",   # purple
    "#00CED1",   # dark turquoise
    "#4488FF",   # electric blue
    "#B0E0FF",   # pale sky blue
]

color_mode          = "cycle"
trail_fade_power    = 2.5
show_wireframe      = true
color_cycle_enabled = true
color_cycle_speed   = 0.04

camera_distance        = 7.0
camera_elevation       = 0.5
camera_fov             = 0.75
camera_elevation_speed = 0.0003

hyperboloid_a = 1.2
hyperboloid_b = 0.9
