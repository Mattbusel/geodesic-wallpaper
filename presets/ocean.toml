# ocean.toml — Gentle ocean-floor bioluminescence on a torus surface.
#
# Slow rotation, blue-green palette, ribbon-style trails.

surface         = "torus"
num_geodesics   = 35
trail_length    = 400
rotation_speed  = 0.0008
time_step       = 0.014
target_fps      = 30
background_color = "#010D18"

color_palette = [
    "#006994",   # ocean blue
    "#00BFFF",   # deep sky blue
    "#20B2AA",   # light sea green
    "#40E0D0",   # turquoise
    "#7FFFD4",   # aquamarine
]

color_mode          = "cycle"
trail_fade_power    = 1.8
show_wireframe      = true
color_cycle_enabled = false

camera_distance        = 6.5
camera_elevation       = 0.35
camera_fov             = 0.8
camera_elevation_speed = 0.0002

torus_R = 2.2
torus_r = 0.65
