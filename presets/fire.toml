# fire.toml — Volcanic fire aesthetic on a hyperbolic paraboloid surface.
#
# Fast animation, red-orange-yellow palette, many short trails.

surface         = "hyperbolic_paraboloid"
num_geodesics   = 60
trail_length    = 200
rotation_speed  = 0.003
time_step       = 0.020
target_fps      = 30
background_color = "#0A0300"

color_palette = [
    "#FF2200",   # red
    "#FF6600",   # orange
    "#FF9900",   # amber
    "#FFCC00",   # gold
    "#FFE066",   # pale yellow
]

color_mode          = "random"
trail_fade_power    = 3.0
show_wireframe      = false
color_cycle_enabled = true
color_cycle_speed   = 0.08

camera_distance        = 5.5
camera_elevation       = 0.6
camera_fov             = 0.9
camera_elevation_speed = 0.0005

# Asymmetric saddle — steeper in one direction
hyperbolic_paraboloid_a = 1.0
hyperbolic_paraboloid_b = 1.5
