# neon.toml — Neon city lights aesthetic on an ellipsoid surface.
#
# Vivid mixed-hue palette, medium speed, hue-cycling enabled.

surface         = "ellipsoid"
num_geodesics   = 45
trail_length    = 350
rotation_speed  = 0.0015
time_step       = 0.016
target_fps      = 30
background_color = "#060008"

color_palette = [
    "#FF00FF",   # magenta
    "#FF0080",   # hot pink
    "#8000FF",   # electric purple
    "#00FFFF",   # cyan
    "#00FF80",   # spring green
]

color_mode          = "cycle"
trail_fade_power    = 2.0
show_wireframe      = true
color_cycle_enabled = true
color_cycle_speed   = 0.12

camera_distance        = 7.5
camera_elevation       = 0.45
camera_fov             = 0.78
camera_elevation_speed = 0.0004

ellipsoid_a = 2.0
ellipsoid_b = 2.5
ellipsoid_c = 1.5
